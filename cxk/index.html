<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子产品数据管理平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
/* ===== CSS Variables ===== */
:root {
  --primary: #4A90D9; --primary-dark: #357ABD; --primary-light: #e8f0fe;
  --sidebar-bg: #1a2332; --sidebar-hover: #243447;
  --bg: #f0f2f5; --card-bg: #fff; --text: #333; --text-light: #666; --border: #e8e8e8;
  --success: #52c41a; --warning: #faad14; --danger: #ff4d4f; --info: #1890ff;
  --shadow: 0 2px 8px rgba(0,0,0,0.08); --radius: 8px;
  --font: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh;}

/* ===== Sidebar ===== */
#sidebar{width:200px;background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 16px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.1);}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .2s;border-left:3px solid transparent;text-decoration:none;font-size:14px;}
.nav-item:hover,.nav-item.active{color:#fff;background:var(--sidebar-hover);border-left-color:var(--primary);}
.nav-icon{font-size:16px;width:20px;text-align:center;}

/* ===== Header ===== */
#header{position:fixed;top:0;left:200px;right:0;height:56px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:var(--shadow);z-index:99;}
#header h1{font-size:18px;font-weight:600;}
#toggle-sidebar{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);}

/* ===== Main Content ===== */
#main-content{margin-left:200px;margin-top:56px;padding:24px;flex:1;min-height:calc(100vh - 56px);}

/* ===== Cards ===== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.stat-icon.blue{background:#e8f0fe;color:var(--primary);}
.stat-icon.green{background:#e6f7e6;color:var(--success);}
.stat-icon.orange{background:#fff7e6;color:var(--warning);}
.stat-icon.red{background:#fff1f0;color:var(--danger);}
.stat-info h3{font-size:13px;color:var(--text-light);font-weight:400;margin-bottom:4px;}
.stat-info .stat-value{font-size:24px;font-weight:700;color:var(--text);}
.stat-info .stat-sub{font-size:12px;color:var(--text-light);margin-top:2px;}

/* ===== Tab Navigation ===== */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card-bg);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow);}
.tab-btn{flex:1;padding:10px 16px;border:none;background:transparent;font-size:14px;cursor:pointer;border-radius:6px;transition:all .2s;color:var(--text-light);font-family:var(--font);}
.tab-btn:hover{color:var(--text);background:rgba(0,0,0,0.04);}
.tab-btn.active{background:var(--primary);color:#fff;font-weight:600;}

/* ===== Tables ===== */
.table-container{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.table-header{padding:16px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border-bottom:1px solid var(--border);}
.table-header input,.table-header select{padding:7px 12px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:var(--font);outline:none;transition:border .2s;}
.table-header input:focus,.table-header select:focus{border-color:var(--primary);}
.table-header input{width:200px;}
.table-header select{min-width:120px;}
.table-wrapper{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:#fafafa;}
th{padding:12px 14px;text-align:left;font-weight:600;color:var(--text-light);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--primary);}
th .sort-arrow{margin-left:4px;font-size:10px;}
td{padding:10px 14px;border-bottom:1px solid var(--border);}
tr:hover{background:var(--primary-light);}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;padding:16px;font-size:13px;}
.pagination button{padding:6px 14px;border:1px solid var(--border);background:#fff;border-radius:4px;cursor:pointer;font-family:var(--font);transition:all .2s;}
.pagination button:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}
.pagination span{color:var(--text-light);}

/* ===== Charts ===== */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.chart-card{background:var(--card-bg);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.chart-card h3{font-size:15px;margin-bottom:16px;color:var(--text);}
.chart-card canvas{width:100%!important;}
.charts-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
.charts-row.cols-1{grid-template-columns:1fr;}

/* ===== Modal ===== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-container{background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-container h3{margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);line-height:1;}

/* ===== Stats Table in Sales Tab ===== */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}

/* ===== Responsive ===== */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #header{left:0;}
  #header h1{font-size:15px;}
  #main-content{margin-left:0;}
  #toggle-sidebar{display:block;}
  .charts-row,.charts-row.cols-3{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-brand">&#9733; 电商管理</div>
  <nav class="sidebar-nav">
    <a class="nav-item active" data-tab="0">&#9776; 数据概览</a>
    <a class="nav-item" data-tab="1">&#9740; 数据查询</a>
    <a class="nav-item" data-tab="2">&#9783; 趋势分析</a>
    <a class="nav-item" data-tab="3">&#9770; 销量统计</a>
  </nav>
</aside>

<header id="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="toggle-sidebar">&#9776;</button>
    <h1 id="page-title">数据概览</h1>
  </div>
  <span style="font-size:13px;color:var(--text-light);" id="current-time"></span>
</header>

<main id="main-content">
  <!-- Tab 0: 数据概览 -->
  <div id="tab-0" class="tab-content"></div>
  <!-- Tab 1: 数据查询 -->
  <div id="tab-1" class="tab-content" style="display:none;"></div>
  <!-- Tab 2: 趋势分析 -->
  <div id="tab-2" class="tab-content" style="display:none;"></div>
  <!-- Tab 3: 销量统计 -->
  <div id="tab-3" class="tab-content" style="display:none;"></div>
</main>

<div id="modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-container" id="modal-content"></div>
</div>

<script>
// ==================== App Core ====================
const DATA = PRODUCT_DATA;
const PAGE_SIZE = 15;
let currentTab = 0;
let chartInstances = {};

function formatCurrency(n){return '¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});}
function formatNum(n){return Number(n).toLocaleString('zh-CN');}
function parseDate(s){return new Date(s);}
function fmtDate(s){const d=new Date(s);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ==================== Sidebar & Tabs ====================
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',function(e){
    e.preventDefault();
    switchTab(parseInt(this.dataset.tab));
  });
});

function switchTab(idx){
  currentTab = idx;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.getElementById('tab-'+idx).style.display='block';
  const titles = ['数据概览','数据查询','趋势分析','销量统计'];
  document.getElementById('page-title').textContent=titles[idx];
  destroyCharts();
  renderTab(idx);
}

function renderTab(idx){
  if(idx===0) renderDashboard();
  else if(idx===1) renderQuery();
  else if(idx===2) renderTrend();
  else if(idx===3) renderSalesStats();
}

// ==================== Chart Helpers ====================
function destroyCharts(){
  Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});
  chartInstances={};
}

// ==================== Tab 0: Dashboard ====================
function renderDashboard(){
  const totalSales = DATA.reduce((s,d)=>s+d.sales,0);
  const totalRevenue = DATA.reduce((s,d)=>s+d.sales*d.price,0);
  const totalStock = DATA.reduce((s,d)=>s+d.stock,0);
  const avgPrice = DATA.reduce((s,d)=>s+d.price,0)/DATA.length;

  let html = '<div class="stats-row">';
  html += statCard('&#9776;','商品总数',DATA.length,'款','blue');
  html += statCard('&#9733;','总销量',formatNum(totalSales),'台','green');
  html += statCard('&#9740;','总销售额',formatCurrency(totalRevenue),'','orange');
  html += statCard('&#9783;','平均价格',formatCurrency(Math.round(avgPrice)),'','red');
  html += statCard('&#9770;','库存总量',formatNum(totalStock),'台','blue');
  html += statCard('&#9787;','品牌数量',String(new Set(DATA.map(d=>d.brand)).size),'个','green');
  html += '</div>';

  // Charts row
  html += '<div class="charts-row"><div class="chart-card"><h3>各类别商品数量</h3><canvas id="chart-category-pie"></canvas></div>';
  html += '<div class="chart-card"><h3>各类别销售额分布</h3><canvas id="chart-revenue-bar"></canvas></div></div>';

  // Top 10 products
  const top10 = [...DATA].sort((a,b)=>b.sales-a.sales).slice(0,10);
  html += '<div class="chart-card" style="margin-bottom:20px;"><h3>Top 10 热销产品</h3><canvas id="chart-top10"></canvas></div>';

  document.getElementById('tab-0').innerHTML=html;

  // Render charts
  setTimeout(()=>{
    // Pie chart
    const catCount = {};
    DATA.forEach(d=>{catCount[d.category]= (catCount[d.category]||0)+1;});
    const catLabels=Object.keys(catCount), catValues=Object.values(catCount);
    const colors=['#4A90D9','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2','#eb2f96','#fa8c16','#2f54eb','#a0d911'];
    chartInstances['pie']=new Chart(document.getElementById('chart-category-pie'),{
      type:'doughnut',
      data:{labels:catLabels,datasets:[{data:catValues,backgroundColor:colors.slice(0,catLabels.length)}]},
      options:{responsive:true,plugins:{legend:{position:'bottom'}}}
    });
    // Revenue by category bar
    const catRevenue={};
    DATA.forEach(d=>{catRevenue[d.category]=(catRevenue[d.category]||0)+d.sales*d.price;});
    chartInstances['revBar']=new Chart(document.getElementById('chart-revenue-bar'),{
      type:'bar',
      data:{labels:Object.keys(catRevenue),datasets:[{label:'销售额',data:Object.values(catRevenue).map(v=>Math.round(v/10000)),backgroundColor:colors.slice(0,Object.keys(catRevenue).length)}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'¥'+formatNum(ctx.raw*10000)}}},scales:{y:{beginAtZero:true,title:{display:true,text:'万元'}}}}
    });
    // Top 10 horizontal bar
    chartInstances['top10']=new Chart(document.getElementById('chart-top10'),{
      type:'bar',
      data:{labels:top10.map(d=>d.name),datasets:[{label:'销量',data:top10.map(d=>d.sales),backgroundColor:colors.map((c,i)=>colors[i%colors.length])}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
    });
  },50);
}

function statCard(icon,title,value,unit,color){
  return '<div class="stat-card"><div class="stat-icon '+color+'">'+icon+'</div><div class="stat-info"><h3>'+title+'</h3><div class="stat-value">'+value+'</div><div class="stat-sub">'+unit+'</div></div></div>';
}

// ==================== Tab 1: Data Query ====================
let queryFilter={search:'',category:'',brand:'',sort:'sales',order:'desc',page:1};

function renderQuery(){
  const cats=[...new Set(DATA.map(d=>d.category))].sort();
  const brands=[...new Set(DATA.map(d=>d.brand))].sort();
  const colors=[...new Set(DATA.map(d=>d.color))].sort();

  let html = '<div class="table-container">';
  html += '<div class="table-header">';
  html += '<input type="text" id="q-search" placeholder="搜索产品名称..." value="'+queryFilter.search+'">';
  html += '<select id="q-category"><option value="">全部类别</option>'+cats.map(c=>'<option value="'+c+'"'+(queryFilter.category===c?' selected':'')+'>'+c+'</option>').join('')+'</select>';
  html += '<select id="q-brand"><option value="">全部品牌</option>'+brands.map(b=>'<option value="'+b+'"'+(queryFilter.brand===b?' selected':'')+'>'+b+'</option>').join('')+'</select>';
  html += '<select id="q-color"><option value="">全部颜色</option>'+colors.map(c=>'<option value="'+c+'">'+c+'</option>').join('')+'</select>';
  html += '<span style="color:var(--text-light);font-size:13px;margin-left:auto;" id="q-count"></span>';
  html += '</div>';

  // Filter
  let filtered = DATA.filter(d=>{
    if(queryFilter.search&&!d.name.toLowerCase().includes(queryFilter.search.toLowerCase()))return false;
    if(queryFilter.category&&d.category!==queryFilter.category)return false;
    if(queryFilter.brand&&d.brand!==queryFilter.brand)return false;
    return true;
  });

  // Sort
  filtered.sort((a,b)=>{
    let va=a[queryFilter.sort], vb=b[queryFilter.sort];
    if(typeof va==='string')return queryFilter.order==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return queryFilter.order==='asc'?va-vb:vb-va;
  });

  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  if(queryFilter.page>totalPages)queryFilter.page=totalPages||1;
  const start=(queryFilter.page-1)*PAGE_SIZE;
  const paged=filtered.slice(start,start+PAGE_SIZE);

  document.getElementById('q-count')&&(document.getElementById('q-count').textContent='共 '+filtered.length+' 条记录');

  // Table
  html += '<div class="table-wrapper"><table><thead><tr>';
  const cols=[
    {key:'id',label:'产品ID'},{key:'name',label:'产品名称'},{key:'category',label:'类别'},
    {key:'brand',label:'品牌'},{key:'model',label:'型号'},{key:'price',label:'价格'},
    {key:'sales',label:'销量'},{key:'stock',label:'库存'},{key:'color',label:'颜色'},
    {key:'spec',label:'配置'},{key:'date',label:'上架日期'}
  ];
  cols.forEach(c=>{
    const arrow = queryFilter.sort===c.key?(queryFilter.order==='asc'?'▲':'▼'):'';
    html += '<th onclick="sortQuery(\''+c.key+'\')">'+c.label+'<span class="sort-arrow">'+arrow+'</span></th>';
  });
  html += '<th>操作</th></tr></thead><tbody>';

  paged.forEach(d=>{
    html += '<tr>';
    html += '<td>'+d.id+'</td><td>'+d.name+'</td><td>'+d.category+'</td><td>'+d.brand+'</td>';
    html += '<td>'+d.model+'</td><td>'+formatCurrency(d.price)+'</td><td>'+formatNum(d.sales)+'</td>';
    html += '<td>'+formatNum(d.stock)+'</td><td>'+d.color+'</td><td>'+d.spec+'</td><td>'+fmtDate(d.date)+'</td>';
    html += '<td><button onclick="showDetail(\''+d.id+'\')" style="padding:4px 10px;border:1px solid var(--primary);background:#fff;color:var(--primary);border-radius:4px;cursor:pointer;">详情</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Pagination
  html += '<div class="pagination">';
  html += '<button onclick="goPage('+(queryFilter.page-1)+')" '+(queryFilter.page<=1?'disabled':'')+'>上一页</button>';
  html += '<span>第 '+queryFilter.page+' / '+totalPages+' 页</span>';
  html += '<button onclick="goPage('+(queryFilter.page+1)+')" '+(queryFilter.page>=totalPages?'disabled':'')+'>下一页</button>';
  html += '</div></div>';

  document.getElementById('tab-1').innerHTML=html;

  // Bind events
  document.getElementById('q-search').addEventListener('input',debounce(function(){
    queryFilter.search=this.value;queryFilter.page=1;renderQuery();
  },300));
  document.getElementById('q-category').addEventListener('change',function(){
    queryFilter.category=this.value;queryFilter.page=1;renderQuery();
  });
  document.getElementById('q-brand').addEventListener('change',function(){
    queryFilter.brand=this.value;queryFilter.page=1;renderQuery();
  });
}

function sortQuery(key){
  if(queryFilter.sort===key)queryFilter.order=queryFilter.order==='asc'?'desc':'asc';
  else{queryFilter.sort=key;queryFilter.order='desc';}
  renderQuery();
}

function goPage(p){
  const filtered=DATA.filter(d=>{
    if(queryFilter.search&&!d.name.toLowerCase().includes(queryFilter.search.toLowerCase()))return false;
    if(queryFilter.category&&d.category!==queryFilter.category)return false;
    if(queryFilter.brand&&d.brand!==queryFilter.brand)return false;
    return true;
  });
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  if(p<1||p>totalPages)return;
  queryFilter.page=p;
  renderQuery();
  document.getElementById('tab-1').scrollIntoView({behavior:'smooth'});
}

function debounce(fn,ms){let t;return function(...args){clearTimeout(t);t=setTimeout(()=>fn.apply(this,args),ms);};}

// ==================== Detail Modal ====================
function showDetail(id){
  const d=DATA.find(p=>p.id===id);
  if(!d)return;
  let html = '<button class="modal-close" onclick="closeModal()">&times;</button>';
  html += '<h3>'+d.name+'</h3>';
  html += '<table style="width:100%"><tbody>';
  html += '<tr><td style="font-weight:600;width:100px;">产品ID</td><td>'+d.id+'</td></tr>';
  html += '<tr><td style="font-weight:600;">类别</td><td>'+d.category+'</td></tr>';
  html += '<tr><td style="font-weight:600;">品牌</td><td>'+d.brand+'</td></tr>';
  html += '<tr><td style="font-weight:600;">型号</td><td>'+d.model+'</td></tr>';
  html += '<tr><td style="font-weight:600;">产地</td><td>'+d.manufacturer+'</td></tr>';
  html += '<tr><td style="font-weight:600;">价格</td><td>'+formatCurrency(d.price)+'</td></tr>';
  html += '<tr><td style="font-weight:600;">销量</td><td>'+formatNum(d.sales)+' 台</td></tr>';
  html += '<tr><td style="font-weight:600;">库存</td><td>'+formatNum(d.stock)+' 台</td></tr>';
  html += '<tr><td style="font-weight:600;">销售额</td><td>'+formatCurrency(d.sales*d.price)+'</td></tr>';
  html += '<tr><td style="font-weight:600;">颜色</td><td>'+d.color+'</td></tr>';
  html += '<tr><td style="font-weight:600;">配置</td><td>'+d.spec+'</td></tr>';
  html += '<tr><td style="font-weight:600;">上架日期</td><td>'+fmtDate(d.date)+'</td></tr>';
  html += '</tbody></table>';
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').style.display='flex';
}

function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
}
document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

// ==================== Tab 2: Trend Analysis ====================
function renderTrend(){
  let html = '<div class="charts-row"><div class="chart-card"><h3>月度销量趋势</h3><canvas id="chart-monthly-sales"></canvas></div>';
  html += '<div class="chart-card"><h3>各类别月度销量趋势</h3><canvas id="chart-category-trend"></canvas></div></div>';
  html += '<div class="charts-row"><div class="chart-card"><h3>各品牌总销量对比</h3><canvas id="chart-brand-sales"></canvas></div>';
  html += '<div class="chart-card"><h3>各产地销量对比</h3><canvas id="chart-mfr-sales"></canvas></div></div>';

  document.getElementById('tab-2').innerHTML=html;

  setTimeout(()=>{
    // Monthly sales trend
    const monthly={};
    DATA.forEach(d=>{
      const m=d.date.substring(0,7);
      monthly[m]=(monthly[m]||0)+d.sales;
    });
    const sortedMonths=Object.keys(monthly).sort();
    chartInstances['monthly']=new Chart(document.getElementById('chart-monthly-sales'),{
      type:'line',
      data:{labels:sortedMonths,datasets:[{label:'月度销量',data:sortedMonths.map(m=>monthly[m]),borderColor:'#4A90D9',backgroundColor:'rgba(74,144,217,0.1)',fill:true,tension:0.3,pointRadius:3}]},
      options:{responsive:true,plugins:{tooltip:{callbacks:{label:ctx=>formatNum(ctx.raw)+' 台'}}},scales:{y:{beginAtZero:true}}}
    });

    // Category trend
    const cats=[...new Set(DATA.map(d=>d.category))];
    const catMonthly={};
    cats.forEach(c=>{catMonthly[c]={};});
    DATA.forEach(d=>{
      const m=d.date.substring(0,7);
      catMonthly[d.category][m]=(catMonthly[d.category][m]||0)+d.sales;
    });
    const catDatasets=cats.map((c,i)=>{
      const vals=sortedMonths.map(m=>catMonthly[c][m]||0);
      const colors2=['#4A90D9','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2','#eb2f96','#fa8c16','#2f54eb','#a0d911'];
      return {label:c,data:vals,borderColor:colors2[i%colors2.length],backgroundColor:'transparent',tension:0.3,pointRadius:2};
    });
    chartInstances['catTrend']=new Chart(document.getElementById('chart-category-trend'),{
      type:'line',
      data:{labels:sortedMonths,datasets:catDatasets},
      options:{responsive:true,plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+formatNum(ctx.raw)}}},scales:{y:{beginAtZero:true}}}
    });

    // Brand sales bar
    const brandSales={};
    DATA.forEach(d=>{brandSales[d.brand]=(brandSales[d.brand]||0)+d.sales;});
    const topBrands=Object.entries(brandSales).sort((a,b)=>b[1]-a[1]).slice(0,15);
    chartInstances['brandBar']=new Chart(document.getElementById('chart-brand-sales'),{
      type:'bar',
      data:{labels:topBrands.map(b=>b[0]),datasets:[{label:'销量',data:topBrands.map(b=>b[1]),backgroundColor:'rgba(74,144,217,0.7)'}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
    });

    // Manufacturer sales
    const mfrSales={};
    DATA.forEach(d=>{mfrSales[d.manufacturer]=(mfrSales[d.manufacturer]||0)+d.sales;});
    const mfrSorted=Object.entries(mfrSales).sort((a,b)=>b[1]-a[1]);
    chartInstances['mfrBar']=new Chart(document.getElementById('chart-mfr-sales'),{
      type:'bar',
      data:{labels:mfrSorted.map(m=>m[0]),datasets:[{label:'销量',data:mfrSorted.map(m=>m[1]),backgroundColor:'rgba(82,196,26,0.7)'}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
    });
  },50);
}

// ==================== Tab 3: Sales Statistics ====================
function renderSalesStats(){
  const totalSales=DATA.reduce((s,d)=>s+d.sales,0);
  const totalRevenue=DATA.reduce((s,d)=>s+d.sales*d.price,0);
  const salesArr=DATA.map(d=>d.sales).sort((a,b)=>a-b);
  const median=salesArr.length%2===0?(salesArr[salesArr.length/2-1]+salesArr[salesArr.length/2])/2:salesArr[Math.floor(salesArr.length/2)];
  const mean=totalSales/DATA.length;
  const variance=salesArr.reduce((s,v)=>s+Math.pow(v-mean,2),0)/DATA.length;
  const stdDev=Math.sqrt(variance);

  let html = '<div class="stats-row">';
  html += statCard('&#9776;','总销量',formatNum(totalSales),'台','blue');
  html += statCard('&#9740;','总销售额',formatCurrency(totalRevenue),'','green');
  html += statCard('&#9783;','平均销量',formatNum(Math.round(mean)),'台/产品','orange');
  html += statCard('&#9770;','销量中位数',formatNum(Math.round(median)),'台','red');
  html += statCard('&#9787;','标准差',formatNum(Math.round(stdDev)),'','blue');
  html += statCard('&#9733;','最高销量',formatNum(salesArr[salesArr.length-1]),'台','green');
  html += statCard('&#9776;','最低销量',formatNum(salesArr[0]),'台','orange');
  html += '</div>';

  // Sales distribution histogram
  html += '<div class="chart-card" style="margin-bottom:20px;"><h3>销量分布直方图</h3><canvas id="chart-histogram"></canvas></div>';

  // Category & Brand & Manufacturer stats
  html += '<div class="charts-row cols-3">';
  html += buildStatTable('类别统计','category');
  html += buildStatTable('品牌统计（Top 10）','brand',10);
  html += buildStatTable('产地统计','manufacturer');
  html += '</div>';

  // Top 10 best sellers table
  html += '<div class="chart-card" style="margin-bottom:20px;"><h3>Top 10 热销产品</h3>';
  html += '<div class="table-wrapper"><table><thead><tr><th>排名</th><th>产品名称</th><th>品牌</th><th>类别</th><th>销量</th><th>价格</th><th>销售额</th></tr></thead><tbody>';
  [...DATA].sort((a,b)=>b.sales-a.sales).slice(0,10).forEach((d,i)=>{
    html += '<tr><td>'+(i+1)+'</td><td>'+d.name+'</td><td>'+d.brand+'</td><td>'+d.category+'</td><td>'+formatNum(d.sales)+'</td><td>'+formatCurrency(d.price)+'</td><td>'+formatCurrency(d.sales*d.price)+'</td></tr>';
  });
  html += '</tbody></table></div></div>';

  document.getElementById('tab-3').innerHTML=html;

  setTimeout(()=>{
    // Histogram
    const bins=10;
    const min=salesArr[0],max=salesArr[salesArr.length-1];
    const binWidth=(max-min)/bins;
    const histogram=new Array(bins).fill(0);
    const binLabels=[];
    for(let i=0;i<bins;i++){
      const lo=Math.round(min+i*binWidth),hi=Math.round(min+(i+1)*binWidth);
      binLabels.push(formatNum(lo)+'-'+formatNum(hi));
    }
    salesArr.forEach(v=>{
      const idx=Math.min(Math.floor((v-min)/binWidth),bins-1);
      histogram[idx]++;
    });
    chartInstances['hist']=new Chart(document.getElementById('chart-histogram'),{
      type:'bar',
      data:{labels:binLabels,datasets:[{label:'产品数量',data:histogram,backgroundColor:'rgba(74,144,217,0.7)',borderColor:'#4A90D9',borderWidth:1}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:'产品数量'}},x:{title:{display:true,text:'销量范围'}}}}
    });
  },50);
}

function buildStatTable(title,field,limit){
  const stats={};
  DATA.forEach(d=>{
    const key=d[field];
    if(!stats[key])stats[key]={sales:0,revenue:0,count:0,avgPrice:0};
    stats[key].sales+=d.sales;
    stats[key].revenue+=d.sales*d.price;
    stats[key].count++;
  });
  Object.values(stats).forEach(s=>{s.avgPrice=s.revenue/s.sales||0;});

  let entries=Object.entries(stats).sort((a,b)=>b[1].sales-a[1].sales);
  if(limit)entries=entries.slice(0,limit);

  let html = '<div class="table-container"><div class="table-header">'+title+'</div>';
  html += '<div class="table-wrapper"><table><thead><tr><th>'+title.replace('统计','')+'</th><th>产品数</th><th>总销量</th><th>总销售额</th><th>平均售价</th></tr></thead><tbody>';
  entries.forEach(([k,v])=>{
    html += '<tr><td>'+k+'</td><td>'+v.count+'</td><td>'+formatNum(v.sales)+'</td><td>'+formatCurrency(v.revenue)+'</td><td>'+formatCurrency(Math.round(v.avgPrice))+'</td></tr>';
  });
  html += '</tbody></table></div></div>';
  return html;
}
